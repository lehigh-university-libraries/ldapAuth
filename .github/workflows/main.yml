name: Main

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:

  main:
    name: Main Process
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.24.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest

      - name: Check and get dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod
          go mod download
          go mod vendor

      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "Error: go.mod or go.sum is not tidy. Run 'go mod tidy' locally and commit the changes."
            exit 1
          fi

      - name: go mod vendor
        run: |
          go mod vendor
          if ! git diff --exit-code vendor/; then
            echo "Error: vendor/ directory is not up-to-date. Run 'go mod vendor' locally and commit the changes."
            exit 1
          fi

      - name: unit test
        run: go test -v -race .
